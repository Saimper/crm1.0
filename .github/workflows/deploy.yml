name: CI/CD

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Nodo raíz: instala dependencias y compila assets una sola vez ──
  setup:
    name: Preparar deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, xml, bcmath, pdo, pdo_mysql, zip, gd, intl, fileinfo, curl, openssl, tokenizer
          coverage: none
          tools: composer:v2

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: public/build
          retention-days: 1

  # ── Rama 1: estilo de código ──
  pint:
    name: Estilo (Pint)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, xml, bcmath, pdo, pdo_mysql, zip, gd, intl, fileinfo, curl, openssl, tokenizer
          coverage: none
          tools: composer:v2
      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run Pint
        run: ./vendor/bin/pint --test

  # ── Rama 2: análisis estático ──
  larastan:
    name: Análisis (Larastan)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, xml, bcmath, pdo, pdo_mysql, zip, gd, intl, fileinfo, curl, openssl, tokenizer
          coverage: none
          tools: composer:v2
      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run Larastan
        run: php vendor/bin/phpstan analyse --memory-limit=1G --no-progress

  # ── Rama 3: suite de tests ──
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: setup
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: crm_test
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: crm_test
      DB_USERNAME: root
      DB_PASSWORD: password
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, xml, bcmath, pdo, pdo_mysql, zip, gd, intl, fileinfo, curl, openssl, tokenizer
          coverage: none
          tools: composer:v2
      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: public/build
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent; then
              echo "MySQL up"; break
            fi
            echo "waiting for mysql..."; sleep 2
          done
      - name: Run tests
        run: php artisan test

  # ── Nodo de convergencia ──
  ci-ok:
    name: CI aprobado
    runs-on: ubuntu-latest
    needs: [pint, larastan, tests]
    steps:
      - run: echo "CI aprobado ✅ — Pint, Larastan y Tests en verde"

  # ── Despliegue (solo main, tras CI aprobado) ──
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci-ok
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            export PATH="/opt/php82/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
            export COMPOSER_ALLOW_SUPERUSER=1
            PHP=/opt/php82/bin/php
            cd /var/www/crm

            $PHP artisan down --render="errors::503" || true

            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            $PHP artisan migrate --force

            npm ci
            npm run build

            $PHP artisan optimize:clear
            $PHP artisan optimize

            chown -R www-data:www-data storage bootstrap/cache

            $PHP artisan queue:restart
            systemctl reload php82-fpm

            $PHP artisan up
